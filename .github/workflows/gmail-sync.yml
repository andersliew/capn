# Secrets: DATABASE_URL, GMAIL_QUERY, GOOGLE_CREDENTIALS_JSON, GOOGLE_TOKEN_JSON
# Do not echo secrets in workflow steps.

name: Gmail to Neon Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GMAIL_QUERY: ${{ secrets.GMAIL_QUERY }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/gmail_sync_requirements.txt

      - name: Install Gmail sync dependencies
        run: pip install -r scripts/gmail_sync_requirements.txt

      - name: Run Gmail sync
        run: python scripts/sync_gmail_to_neon.py
